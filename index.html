<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>clicks • Nonton Film</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #000; overflow: hidden; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; color: #fff; }
    body { display: flex; flex-direction: column; }
    
    .app-bar { flex-shrink: 0; background: #0a0a0a; padding: 10px 16px; border-bottom: 2px solid #e50914; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; }
    .logo { font-family: 'Press Start 2P', cursive; font-size: 20px; color: #e50914; text-shadow: 0 0 10px rgba(229,9,20,0.7); letter-spacing: 2px; }
    .search-logo-btn { background: linear-gradient(135deg, #e50914, #b0070f); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: transform 0.2s; color: white; }
    .search-logo-btn:active { transform: scale(0.92); }
    
    .banner-link { display: block; width: 100%; line-height: 0; flex-shrink: 0; }
    .banner-link img { width: 100%; height: auto; display: block; }
    
    .main { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 12px; height: 100%; -webkit-overflow-scrolling: touch; }
    .status-bar { padding: 8px 0; font-size: 12px; color: #aaa; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #e50914; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    
    .movie-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding-bottom: 20px; }
    .movie-card { background: #111; border-radius: 10px; overflow: hidden; cursor: pointer; display: flex; flex-direction: column; border: 2px solid rgba(255,215,0,0.2); transition: transform 0.1s; }
    .movie-card:active { transform: scale(0.96); }
    .thumb { position: relative; width: 100%; padding-bottom: 150%; background: #1a1a1a; overflow: hidden; }
    .thumb-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .thumb-placeholder { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 30px; opacity: 0.4; }
    .movie-title { padding: 10px 6px; font-size: 11px; font-weight: 500; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: #0d0d0d; }

    /* IKLAN GRID: 728x90, scale 0.5, rata kiri */
    .ad-row { grid-column: 1 / -1; margin: 10px 0; overflow: visible; }
    .ad-box { width: 728px; min-height: 45px; transform: scale(0.5); transform-origin: left center; line-height: 0; }

    footer { text-align: center; font-size: 9px; color: #444; padding: 20px 0 30px; flex-shrink: 0; }

    /* HALAMAN SINOPSIS */
    .sinopsis-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 200; overflow-y: auto; display: none; opacity: 0; transition: opacity 0.3s ease; -webkit-overflow-scrolling: touch; }
    .sinopsis-overlay.active { display: block; opacity: 1; }
    .cover-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; background-repeat: no-repeat; z-index: 0; filter: brightness(0.5) blur(2px); transform: scale(1.02); }
    .overlay-grad { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 40%, rgba(0,0,0,0.65), rgba(0,0,0,0.85)); z-index: 1; }
    .sinopsis-content { position: relative; z-index: 2; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 60px 20px 80px; text-align: center; }
    .film-title { font-size: 2.3rem; font-weight: 800; margin-bottom: 24px; background: linear-gradient(135deg, #FFD966, #E50914, #FFB347); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .sinopsis-card { max-width: 720px; width: 90%; background: rgba(20,20,30,0.6); backdrop-filter: blur(20px); border-radius: 48px; padding: 24px 28px; margin-bottom: 20px; border: 2px solid rgba(255,215,0,0.5); animation: goldBorderPulse 2s infinite; position: relative; overflow: hidden; }
    .sinopsis-card::before { content: ''; position: absolute; top: -50%; left: -60%; width: 200%; height: 200%; background: linear-gradient(115deg, rgba(255,215,0,0) 0%, rgba(255,215,0,0) 35%, rgba(255,215,0,0.15) 45%, rgba(255,215,0,0.3) 50%, rgba(255,215,0,0.15) 55%, rgba(255,215,0,0) 65%, rgba(255,215,0,0) 100%); transform: rotate(25deg); animation: shimmerGold 3s infinite linear; pointer-events: none; border-radius: 48px; }
    @keyframes shimmerGold { 0% { transform: rotate(25deg) translateX(-100%); } 100% { transform: rotate(25deg) translateX(100%); } }
    @keyframes goldBorderPulse { 0% { border-color: rgba(255,215,0,0.4); } 50% { border-color: rgba(255,215,0,1); } 100% { border-color: rgba(255,215,0,0.4); } }    .sinopsis-text { font-size: 1rem; line-height: 1.6; text-align: justify; color: #f0f0f0; position: relative; z-index: 1; }
    .sinopsis-img { max-width: 100%; border-radius: 24px; margin-top: 12px; position: relative; z-index: 1; }
    .play-btn { background: linear-gradient(135deg, #E50914, #B0070F); border: none; color: white; padding: 12px 38px; border-radius: 60px; font-size: 1.15rem; font-weight: bold; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 10px; margin-bottom: 20px; animation: heartbeat 1.2s infinite; }
    @keyframes heartbeat { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    .play-btn:active { transform: scale(0.96); animation: none; }
    .back-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 10px 24px; border-radius: 40px; font-size: 14px; cursor: pointer; margin-top: 10px; transition: all 0.2s; }
    .back-btn:hover { background: rgba(255,255,255,0.2); }
    
    /* IKLAN SINOPSIS: FRAME GOLD DENGAN ANIMASI */
    .ad-frame-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 20px 0;
      padding: 0;
    }
    .ad-gold-frame {
      position: relative;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      border: 3px solid #FFD700;
      border-radius: 20px;
      padding: 20px 28px;
      overflow: visible;
      animation: goldFrameGlow 1.5s infinite ease-in-out;
      box-shadow: 0 0 20px rgba(255,215,0,0.4);
      transform: scale(0.5);
      transform-origin: center center;
    }
    @keyframes goldFrameGlow {
      0% { 
        border-color: #FFD700; 
        box-shadow: 0 0 15px rgba(255,215,0,0.3); 
      }
      50% { 
        border-color: #FFA500; 
        box-shadow: 0 0 40px rgba(255,215,0,0.9), 0 0 60px rgba(255,165,0,0.6); 
      }
      100% { 
        border-color: #FFD700; 
        box-shadow: 0 0 15px rgba(255,215,0,0.3); 
      }
    }
    .ad-sinopsis {
      width: 728px;
      min-height: 45px;
      line-height: 0;
      display: flex;
      justify-content: center;
      align-items: center;    }
    .ad-sinopsis > * {
      margin: 0 auto !important;
    }

    @media (max-width: 600px) {
      .film-title { font-size: 1.7rem; }
      .sinopsis-card { padding: 18px 20px; }
      .play-btn { padding: 10px 28px; font-size: 1rem; }
      .ad-gold-frame { padding: 16px 22px; border-width: 2.5px; }
    }
  </style>
</head>
<body>
<div id="mainPage" style="display: flex; flex-direction: column; height: 100%;">
  <div class="app-bar">
    <div class="logo">CLICKS</div>
    <button class="search-logo-btn" id="searchLogoBtn">🔍</button>
  </div>
  <a href="https://www.facebook.com/profile.php?id=61560222545325" class="banner-link" target="_blank">
    <img src="https://images2.imgbox.com/33/38/RPYS32UR_o.jpg" alt="Promosi">
  </a>
  <div class="main" id="scrollContainer">
    <div class="status-bar">
      <div class="dot"></div>
      <span id="statusText">Memuat data...</span>
    </div>
    <div id="movieGrid" class="movie-grid"></div>
    <footer>clicks • streaming online</footer>
    <div id="scrollSentinel" style="height: 1px;"></div>
  </div>
</div>

<!-- SINOPSIS OVERLAY -->
<div id="sinopsisOverlay" class="sinopsis-overlay">
  <div id="coverBg" class="cover-bg"></div>
  <div class="overlay-grad"></div>
  <div class="sinopsis-content">
    <h1 class="film-title" id="filmTitle">Memuat...</h1>
    <div class="sinopsis-card" id="sinopsisCard"></div>
    
    <!-- IKLAN SINOPSIS: FRAME GOLD DENGAN ANIMASI -->
    <div class="ad-frame-wrapper">
      <div class="ad-gold-frame">
        <div class="ad-sinopsis" id="adSinopsisContainer"></div>
      </div>
    </div>
    
    <button class="play-btn" id="playButton">▶ TONTON SEKARANG</button>
    <button class="back-btn" id="backButton">← Kembali</button>  </div>
</div>

<script>
  (function() {
    const BASE_URL = 'https://cdn.jsdelivr.net/gh/statisfileindonesia-design';
    const KEY = '25041995';
    const REPOS = ['THAI','RUSIA','MALAY','WAR_','HORROR','SKI_FY','KOMEDI','AMERIKA','KARTUN','INDONESIA_II','CHINA','INDONESIA_1','INDIA','ANIME'];

    let allMovies = [];
    let currentMovie = null;
    let renderedCount = 0;
    const BATCH_SIZE = 3; 
    let isLoading = false;

    const AD_KEYS = [
      '13a3cad66c890f8738d7259ea7640c6b',
      'bb172bff379079cddc69a1fd5f23b864',
      '615d34d1407d927e6afa4befdd1e07a9'
    ];
    let adIndex = 0;

    const movieGrid = document.getElementById('movieGrid');
    const statusText = document.getElementById('statusText');
    const sinopsisOverlay = document.getElementById('sinopsisOverlay');
    const scrollContainer = document.getElementById('scrollContainer');
    const sentinel = document.getElementById('scrollSentinel');

    document.getElementById('searchLogoBtn').onclick = () => window.open('https://89586a29.kacung-mkd.pages.dev/', '_blank');
    document.getElementById('backButton').onclick = () => {
      sinopsisOverlay.classList.remove('active');
      document.body.style.overflow = '';
      currentMovie = null;
    };

    function xorDecrypt(b64, key) {
      if (!b64) return '';
      try {
        const bin = atob(b64);
        let res = '';
        for (let i = 0; i < bin.length; i++) res += String.fromCharCode(bin.charCodeAt(i) ^ key.charCodeAt(i % key.length));
        return res;
      } catch(e) { return ''; }
    }
    function escapeHtml(s) {
      if (!s) return '';
      return s.replace(/[&<>]/g, m => ({ '&': '&', '<': '<', '>': '>' })[m]);
    }

    async function fetchRepo(repoId) {      const url = `${BASE_URL}/${repoId}@main/database.json?t=${Date.now()}`;
      try {
        const res = await fetch(url, { cache: 'no-cache' });
        if (!res.ok) return [];
        const json = await res.json();
        return json.data || json.movies || json;
      } catch(e) { return []; }
    }

    function decryptMovie(raw) {
      const title = xorDecrypt(raw.NAME || raw.NAMAE || '', KEY) || 'Tanpa Judul';
      const cover = xorDecrypt(raw.COVER || '', KEY);
      const sinopsis = xorDecrypt(raw.SINOPSIS || '', KEY);
      const link = xorDecrypt(raw.LINK || '', KEY);
      if (!link) return null;
      return { title, cover: cover || '', sinopsis: sinopsis || '', link };
    }

    // INJEKSI IKLAN GRID (728x90)
    function injectAd(box, key, width, height) {
      if (!box || box.dataset.loaded) return;
      box.dataset.loaded = 'true';
      window.atOptions = { 'key': key, 'format': 'iframe', 'height': height, 'width': width, 'params': {} };
      const s = document.createElement('script');
      s.src = `https://www.highperformanceformat.com/${key}/invoke.js`;
      s.async = true;
      box.appendChild(s);
    }
    
    // INJEKSI IKLAN SINOPSIS
    function loadSinopsisAd(){
      const c = document.getElementById('adSinopsisContainer');
      if(!c || c.dataset.loaded) return;
      c.dataset.loaded = 'true';
      c.innerHTML = '';
      window.atOptions = {'key':'bb172bff379079cddc69a1fd5f23b864','format':'iframe','height':50,'width':320,'params':{}};
      const s = document.createElement('script');
      s.src = 'https://www.highperformanceformat.com/bb172bff379079cddc69a1fd5f23b864/invoke.js';
      s.async = true;
      c.appendChild(s);
    }

    function renderNextBatch() {
      if (isLoading || renderedCount >= allMovies.length) return;
      isLoading = true;

      const end = Math.min(renderedCount + BATCH_SIZE, allMovies.length);
      
      for (let i = renderedCount; i < end; i++) {
        const movie = allMovies[i];        const card = document.createElement('div');
        card.className = 'movie-card';
        card.onclick = () => showSinopsis(movie);
        
        let thumbHtml = '<span class="thumb-placeholder">🎬</span>';
        if (movie.cover && movie.cover.match(/^https?:\/\//)) {
          thumbHtml = `<img class="thumb-img" src="${escapeHtml(movie.cover)}" loading="lazy" onerror="this.outerHTML='<span class=thumb-placeholder>🎬</span>'">`;
        }
        card.innerHTML = `<div class="thumb">${thumbHtml}</div><div class="movie-title">${escapeHtml(movie.title)}</div>`;
        movieGrid.appendChild(card);
        
        // SISIPKAN BANNER SETIAP 3 FILM
        if ((i + 1 - renderedCount) === 3 && i + 1 < allMovies.length) {
          const row = document.createElement('div');
          row.className = 'ad-row';
          const box = document.createElement('div');
          box.className = 'ad-box';
          row.appendChild(box);
          movieGrid.appendChild(row);
          
          injectAd(box, AD_KEYS[adIndex % AD_KEYS.length], 728, 90);
          adIndex++;
        }
      }
      renderedCount = end;
      isLoading = false;
    }

    const filmObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting && !isLoading && renderedCount < allMovies.length) {
          renderNextBatch();
        }
      });
    }, { root: scrollContainer, rootMargin: '200px' });

    function startObserving() {
      if (sentinel) filmObserver.observe(sentinel);
    }

    async function loadAllData() {
      try {
        statusText.textContent = 'Memuat database...';
        movieGrid.innerHTML = '';
        allMovies = [];
        renderedCount = 0;
        adIndex = 0;

        const promises = REPOS.map(r => fetchRepo(r));
        const results = await Promise.allSettled(promises);
        for (const res of results) {
          if (res.status === 'fulfilled' && Array.isArray(res.value)) {
            const decrypted = res.value.map(decryptMovie).filter(m => m !== null);
            allMovies.push(...decrypted);
          }
        }

        allMovies.sort(() => Math.random() - 0.5);

        if (allMovies.length === 0) {
          statusText.textContent = '❌ Gagal memuat data.';
          return;
        }

        statusText.textContent = `✅ ${allMovies.length} film siap`;
        document.querySelector('.dot').style.display = 'none';

        renderNextBatch();
        startObserving();
      } catch(e) {
        console.error('Load error:', e);
        statusText.textContent = '❌ Error koneksi.';
      }
    }

    function showSinopsis(movie) {
      try {
        currentMovie = movie;
        document.getElementById('coverBg').style.backgroundImage = movie.cover && movie.cover.startsWith('http') ? `url('${escapeHtml(movie.cover)}')` : '';
        document.getElementById('filmTitle').textContent = movie.title;

        const sinopsisDiv = document.getElementById('sinopsisCard');
        const isImage = movie.sinopsis && (movie.sinopsis.startsWith('http://') || movie.sinopsis.startsWith('https://'));
        if (isImage) {
          sinopsisDiv.innerHTML = `<img class="sinopsis-img" src="${escapeHtml(movie.sinopsis)}" onerror="this.style.display='none'">`;
        } else if (movie.sinopsis && movie.sinopsis.trim().length > 0) {
          sinopsisDiv.innerHTML = movie.sinopsis.split(/\n+/).filter(p => p.trim()).map(p => `<p class="sinopsis-text" style="margin-bottom:14px;">${escapeHtml(p.trim())}</p>`).join('');
        } else {
          sinopsisDiv.innerHTML = '<p class="sinopsis-text">Tidak ada sinopsis</p>';
        }

        // ✅ IKLAN SINOPSIS: Dengan frame gold & animasi
        loadSinopsisAd();

        const playBtn = document.getElementById('playButton');
        const newPlayBtn = playBtn.cloneNode(true);
        playBtn.parentNode.replaceChild(newPlayBtn, playBtn);
        newPlayBtn.id = 'playButton';
        newPlayBtn.onclick = () => {          if (!currentMovie) return;
          const link = currentMovie.link;
          let videoId = '';
          const match = link.match(/video\/(\d+)/);
          if (match) videoId = match[1];
          else {
            const numMatch = link.match(/(\d{10,})/);
            if (numMatch) videoId = numMatch[1];
          }
          if (videoId) window.open(`https://ok.ru/videoembed/${videoId}`, '_blank');
          else if (link) window.open(link, '_blank');
          else alert('Link video tidak tersedia');
        };

        sinopsisOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      } catch(e) {
        console.error('Sinopsis error:', e);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadAllData);
    } else {
      loadAllData();
    }
  })();
</script>
</body>
</html>
