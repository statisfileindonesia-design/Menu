<script>
  // ======================
  // PULL-TO-REFRESH PLAYER
  // ======================
  (function() {
    const playerOverlay = document.getElementById('playerOverlay');
    const videoIframe = document.getElementById('videoIframe');
    const indicator = document.getElementById('pullIndicator');
    const arrow = indicator.querySelector('.arrow');
    const spinner = indicator.querySelector('.spinner');
    const text = indicator.querySelector('.text');
    
    let isPlayerActive = false;
    let pullStartY = 0;
    let pullDistance = 0;
    let isPulling = false;
    let isRefreshing = false;
    const THRESHOLD = 100;
    
    function checkPlayerState() {
      isPlayerActive = playerOverlay.classList.contains('active');
      if (!isPlayerActive) {
        resetPull();
      }
    }
    
    const observer = new MutationObserver(checkPlayerState);
    observer.observe(playerOverlay, { attributes: true, attributeFilter: ['class'] });
    
    function resetPull() {
      pullDistance = 0;
      isPulling = false;
      indicator.classList.remove('active', 'refreshing');
      arrow.classList.remove('flip');
      text.textContent = 'Tarik untuk reload';
      document.body.style.transform = '';
      document.body.style.transition = '';
    }
    
    function refreshPlayer() {
      if (isRefreshing || !isPlayerActive) return;
      isRefreshing = true;
      indicator.classList.add('refreshing');
      text.textContent = 'Memuat ulang...';
      
      const src = videoIframe.src;
      if (!src) {
        location.reload();
        return;
      }
      
      videoIframe.src = '';
      setTimeout(() => {
        videoIframe.src = src;
        setTimeout(() => {
          isRefreshing = false;
          resetPull();
          // Toast
          const toast = document.createElement('div');
          toast.style.cssText = 'position:fixed; bottom:150px; left:50%; transform:translateX(-50%); background:#e50914; color:#fff; padding:8px 20px; border-radius:20px; font-size:13px; z-index:10011; pointer-events:none;';
          toast.textContent = '✅ Video direload';
          document.body.appendChild(toast);
          setTimeout(() => toast.remove(), 2000);
        }, 800);
      }, 200);
    }
    
    document.addEventListener('touchstart', function(e) {
      checkPlayerState();
      if (!isPlayerActive || isRefreshing) return;
      pullStartY = e.touches[0].clientY;
      isPulling = true;
    }, { passive: true });
    
    document.addEventListener('touchmove', function(e) {
      if (!isPlayerActive || !isPulling || isRefreshing) return;
      
      const currentY = e.touches[0].clientY;
      pullDistance = currentY - pullStartY;
      
      if (pullDistance > 10) {
        const limited = Math.min(pullDistance, 160);
        indicator.classList.add('active');
        if (limited >= THRESHOLD) {
          arrow.classList.add('flip');
          text.textContent = 'Lepaskan untuk reload';
        } else {
          arrow.classList.remove('flip');
          text.textContent = 'Tarik untuk reload';
        }
        document.body.style.transform = `translateY(${limited * 0.5}px)`;
        document.body.style.transition = 'none';
        
        if (limited > 5) e.preventDefault();
      }
    }, { passive: false });
    
    document.addEventListener('touchend', function(e) {
      if (!isPlayerActive || !isPulling || isRefreshing) {
        resetPull();
        return;
      }
      
      document.body.style.transition = 'transform 0.3s ease';
      document.body.style.transform = 'translateY(0)';
      
      if (pullDistance >= THRESHOLD) {
        refreshPlayer();
      } else {
        resetPull();
      }
      
      setTimeout(() => {
        document.body.style.transition = '';
        if (!isRefreshing) resetPull();
      }, 300);
      
      isPulling = false;
    }, { passive: true });

    window.addEventListener('touchmove', function(e) {
      if (isPlayerActive && pullDistance > 5) {
        e.preventDefault();
      }
    }, { passive: false });
    
    console.log('[PullRefresh] Ready');
  })();

    function closeSinopsis(){try{sinopsisOverlay.classList.remove('active');setTimeout(()=>{document.body.style.overflow='';currentMovie=null;if(location.hash==='#sinopsis')history.replaceState(null,'',location.pathname);},300);}catch(e){sinopsisOverlay.style.opacity='0';sinopsisOverlay.style.visibility='hidden';sinopsisOverlay.style.pointerEvents='none';document.body.style.overflow='';currentMovie=null;}}
    function loadSinopsisAd(){let c=document.getElementById('adSinopsisContainer');if(!c)return;c.innerHTML='';try{window.atOptions={key:'bb172bff379079cddc69a1fd5f23b864',format:'iframe',height:90,width:728,params:{}};let s=document.createElement('script');s.src='https://www.highperformanceformat.com/bb172bff379079cddc69a1fd5f23b864/invoke.js';s.async=true;c.appendChild(s);}catch(e){}}
    function loadPlayerAd(){if(!playerAdContainer)return;playerAdContainer.innerHTML='';let key='13a3cad66c890f8738d7259ea7640c6b';window.atOptions={key:key,format:'iframe',height:90,width:728,params:{}};let s=document.createElement('script');s.src='https://www.highperformanceformat.com/'+key+'/invoke.js';s.async=true;playerAdContainer.appendChild(s);playerAdBanner.classList.add('show');setTimeout(()=>{if(playerAdContainer.innerHTML===''||!playerAdContainer.querySelector('iframe')){playerAdContainer.innerHTML='';let alt='f2d25fea54209ec308e90169746bc51c';window.atOptions={key:alt,format:'iframe',height:90,width:728,params:{}};let as=document.createElement('script');as.src='https://www.highperformanceformat.com/'+alt+'/invoke.js';as.async=true;playerAdContainer.appendChild(as);}},3000);}
    function hidePlayerAd(){playerAdBanner.classList.remove('show');if(playerAdContainer)playerAdContainer.innerHTML='';}
    function closePlayer(){playerState.active=false;playerOverlay.classList.remove('active');if(playerState._audioCheck){clearInterval(playerState._audioCheck);playerState._audioCheck=null;}if(videoIframe)videoIframe.src='';hidePlayerAd();unmuteHelper.style.display='none';document.body.style.overflow='';if(location.hash==='#player')history.replaceState(null,'',location.pathname);if(currentMovie&&!sinopsisOverlay.classList.contains('active'))setTimeout(()=>showSinopsis(currentMovie),350);}
    playerOverlay.onclick=function(e){if(e.target===playerOverlay)closePlayer();};
    document.getElementById('playerContainer').onclick=function(e){e.stopPropagation();};

    function xorDecrypt(b64,key){if(!b64)return'';try{let bin=atob(b64),res='';for(let i=0;i<bin.length;i++)res+=String.fromCharCode(bin.charCodeAt(i)^key.charCodeAt(i%key.length));return res;}catch(e){return'';}}
    function esc(s){if(!s)return'';return s.replace(/[&<>]/g,m=>({'&':'&','<':'<','>':'>'})[m]);}
    async function fetchRepo(id){try{let r=await fetch(BASE_URL+'/'+id+'@main/database.json?t='+Date.now(),{cache:'no-cache'});if(!r.ok)return[];let j=await r.json();return j.data||j.movies||j;}catch(e){return[];}}
    function decryptMovie(raw){let t=xorDecrypt(raw.NAME||raw.NAMAE||'',KEY)||'Tanpa Judul',c=xorDecrypt(raw.COVER||'',KEY),s=xorDecrypt(raw.SINOPSIS||'',KEY),l=xorDecrypt(raw.LINK||'',KEY);if(!l)return null;return{title:t,cover:c||'',sinopsis:s||'',link:l};}
    function injectAd(box,key,w,h){if(!box)return;box.innerHTML='';try{window.atOptions={key:key,format:'iframe',height:h,width:w,params:{}};let s=document.createElement('script');s.src='https://www.highperformanceformat.com/'+key+'/invoke.js';s.async=true;box.appendChild(s);}catch(e){}}
    function renderNextBatch(){if(isLoading||renderedCount>=allMovies.length)return;isLoading=true;let end=Math.min(renderedCount+3,allMovies.length);for(let i=renderedCount;i<end;i++){let m=allMovies[i],card=document.createElement('div');card.className='movie-card';card.onclick=()=>showSinopsis(m);let thumb=m.cover&&m.cover.match(/^https?:\/\//)?`<img class="thumb-img" src="${esc(m.cover)}" loading="lazy" onerror="this.outerHTML='<span class=thumb-placeholder></span>'">`:'<span class="thumb-placeholder"></span>';card.innerHTML=`<div class="thumb">${thumb}</div><div class="movie-title">${esc(m.title)}</div>`;movieGrid.appendChild(card);if((i+1-renderedCount)===3&&i+1<allMovies.length){let row=document.createElement('div');row.className='ad-row';let box=document.createElement('div');box.className='ad-box';row.appendChild(box);movieGrid.appendChild(row);injectAd(box,AD_KEYS[adIndex%AD_KEYS.length],728,90);adIndex++;}}renderedCount=end;isLoading=false;}
    const filmObserver=new IntersectionObserver(e=>{e.forEach(en=>{if(en.isIntersecting&&!isLoading&&renderedCount<allMovies.length)renderNextBatch();})},{root:scrollContainer,rootMargin:'200px'});
    function startObserving(){if(sentinel)filmObserver.observe(sentinel);}
    async function loadAllData(){try{statusText.textContent='Memuat database...';movieGrid.innerHTML='';allMovies=[];renderedCount=0;adIndex=0;let proms=REPOS.map(fetchRepo),results=await Promise.allSettled(proms);for(let r of results)if(r.status==='fulfilled'&&Array.isArray(r.value)){let dec=r.value.map(decryptMovie).filter(m=>m);allMovies.push(...dec);}allMovies.sort(()=>Math.random()-0.5);if(!allMovies.length){statusText.textContent='❌ Gagal memuat data.';return;}statusText.textContent='✅ '+allMovies.length+' film siap';document.querySelector('.dot').style.display='none';renderNextBatch();startObserving();}catch(e){statusText.textContent='❌ Error koneksi.';}}
    function getEmbedUrl(link){let m=link.match(/video\/(\d+)/);if(m)return 'https://ok.ru/videoembed/'+m[1]+'?autoplay=1&nochat=1&quality=720&volume=100';let n=link.match(/(\d{10,})/);if(n)return 'https://ok.ru/videoembed/'+n[1]+'?autoplay=1&nochat=1&quality=720&volume=100';return link;}
    function getBackupUrl(link){let m=link.match(/video\/(\d+)/);if(m)return 'https://ok.ru/video/'+m[1];let n=link.match(/(\d{10,})/);if(n)return 'https://ok.ru/video/'+n[1];return link;}
    
    function openPlayer(url) {
      playerState.active = true;
      playerState.videoUrl = url;
      videoIframe.src = '';
      playerOverlay.classList.add('active');
      document.body.style.overflow = 'hidden';
      setTimeout(() => {
        videoIframe.src = url;
        unmuteHelper.style.display = 'block';
        unmuteHelper.textContent = '🔊 TAP UNTUK AKTIFKAN SUARA & FULLSCREEN';
        loadPlayerAd();
        let checks = 0, interval = setInterval(() => {
          checks++;
          if (checks === 5) {
            unmuteHelper.innerHTML = '⚠️ SUARA BERMASALAH?<br><small>Tap untuk buka di OK.ru</small>';
            unmuteHelper.onclick = function(e) {
              e.preventDefault();
              if (currentMovie && currentMovie.link) window.open(getBackupUrl(currentMovie.link), '_blank');
              const src = videoIframe.src;
              videoIframe.src = '';
              setTimeout(() => { videoIframe.src = src; }, 200);
              unmuteHelper.style.display = 'none';
            };
          }
        }, 1000);
        playerState._audioCheck = interval;
      }, 200);
      if (history.pushState) history.pushState({player: true}, '', '#player');
    }

    function showSinopsis(movie) {
      try {
        currentMovie = movie;
        // Simpan ke sessionStorage untuk akses lewat hash #player
        sessionStorage.setItem('currentMovie', JSON.stringify(movie));
        document.getElementById('coverBg').style.backgroundImage = movie.cover && movie.cover.startsWith('http') ? `url('${esc(movie.cover)}')` : '';
        document.getElementById('filmTitle').textContent = movie.title;
        const sinopsisDiv = document.getElementById('sinopsisCard');
        const isImage = movie.sinopsis && (movie.sinopsis.startsWith('http://') || movie.sinopsis.startsWith('https://'));
        if (isImage) {
          sinopsisDiv.innerHTML = `<img class="sinopsis-img" src="${esc(movie.sinopsis)}" onerror="this.style.display='none'">`;
        } else if (movie.sinopsis && movie.sinopsis.trim()) {
          sinopsisDiv.innerHTML = movie.sinopsis.split(/\n+/).filter(p => p.trim()).map(p => `<p class="sinopsis-text" style="margin-bottom:14px;">${esc(p.trim())}</p>`).join('');
        } else {
          sinopsisDiv.innerHTML = '<p class="sinopsis-text">Tidak ada sinopsis</p>';
        }
        loadSinopsisAd();
        const playBtn = document.getElementById('playButton');
        const newPlayBtn = playBtn.cloneNode(true);
        playBtn.parentNode.replaceChild(newPlayBtn, playBtn);
        newPlayBtn.id = 'playButton';
        newPlayBtn.onclick = () => {
          if (!currentMovie) return;
          const videoUrl = getEmbedUrl(currentMovie.link);
          if (videoUrl) openPlayer(videoUrl);
          else alert('Link tidak valid');
        };
        if (history.pushState) history.pushState({sinopsis: true}, '', '#sinopsis');
        sinopsisOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      } catch(e) {
        console.error(e);
      }
    }

    // === CEK HASH SAAT LOAD ===
    function checkInitialHash() {
      if (window.location.hash === '#player') {
        // Coba ambil data film yang tersimpan
        const saved = sessionStorage.getItem('currentMovie');
        if (saved) {
          try {
            const movie = JSON.parse(saved);
            if (movie && movie.link) {
              currentMovie = movie;
              const videoUrl = getEmbedUrl(movie.link);
              if (videoUrl) openPlayer(videoUrl);
            }
          } catch(e) {}
        }
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        if (playerState.active) closePlayer();
        else if (sinopsisOverlay.classList.contains('active')) closeSinopsis();
      }
    });

    // Inisialisasi
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        loadAllData();
        checkInitialHash();
      });
    } else {
      loadAllData();
      checkInitialHash();
    }
  })();
</script>
</body>
</html>
